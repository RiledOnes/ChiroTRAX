<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intake Images — ChiroTrax</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fffdf7;
      --surface2: #ede7da;
      --surface3: #e0d9ca;
      --border: #d4ccb8;
      --ink: #2c2a25;
      --ink2: #6b6558;
      --ink3: #9a9283;
      --accent: #2e7d32;
      --accent-dim: rgba(46,125,50,0.10);
      --accent2: #43a047;
      --warn: #e67e22;
      --danger: #c0392b;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Overall layout ─────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Date sidebar ──────────────────────────────────── */
    #date-sidebar {
      width: 200px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #sidebar-header a {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
    }

    #sidebar-header a:hover { text-decoration: underline; }

    #sidebar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
    }

    #date-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 12px;
      color: var(--ink2);
      border-left: 3px solid transparent;
      transition: all 0.1s;
    }

    .date-row:hover { background: var(--surface2); color: var(--ink); }

    .date-row.active {
      border-left-color: var(--accent);
      background: var(--accent-dim);
      color: var(--ink);
      font-weight: 600;
    }

    .date-badge {
      font-size: 10px;
      background: var(--surface3);
      color: var(--ink3);
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 500;
    }

    .date-row.active .date-badge {
      background: var(--accent);
      color: #fff;
    }

    /* ── Main area ─────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Toolbar ───────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #toolbar-label {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
    }

    #toolbar-counter {
      font-size: 12px;
      color: var(--ink3);
      margin-left: 2px;
    }

    #toolbar-spacer { flex: 1; }

    .tb-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink2);
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.1s;
    }

    .tb-btn:hover:not(:disabled) {
      background: var(--surface3);
      color: var(--ink);
    }

    .tb-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .tb-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    #btn-prev, #btn-next {
      font-size: 16px;
      padding: 4px 10px;
      font-weight: 700;
    }

    /* ── Image area ────────────────────────────────────── */
    #image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }

    #image-area.zoom-mode { cursor: zoom-out; overflow: auto; align-items: flex-start; justify-content: flex-start; }

    #current-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      transition: none;
      user-select: none;
    }

    #image-area.zoom-mode #current-img {
      max-width: none;
      max-height: none;
      width: auto;
      height: auto;
    }

    #img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--ink3);
      font-size: 13px;
    }

    #img-placeholder .placeholder-icon { font-size: 48px; opacity: 0.4; }

    #img-spinner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    #img-error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--danger);
      font-size: 13px;
    }

    /* ── Thumbnail strip ───────────────────────────────── */
    #thumb-strip {
      display: none;
      flex-shrink: 0;
      padding: 8px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      gap: 8px;
      overflow-x: auto;
      align-items: center;
    }

    .thumb-tile {
      width: 60px;
      height: 46px;
      flex-shrink: 0;
      border-radius: 6px;
      border: 2px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--ink3);
      font-weight: 600;
      transition: border-color 0.1s;
    }

    .thumb-tile:hover { border-color: var(--ink3); }

    .thumb-tile.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .thumb-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Error / empty states ──────────────────────────── */
    #global-error {
      display: none;
      padding: 48px 32px;
      text-align: center;
      color: var(--danger);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Date sidebar -->
  <div id="date-sidebar">
    <div id="sidebar-header">
      <span id="sidebar-title">Intake Sheets</span>
      <a href="/">← Back</a>
    </div>
    <div id="date-list">
      <div style="padding:20px 16px;font-size:12px;color:var(--ink3)">Loading…</div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Toolbar -->
    <div id="toolbar">
      <span id="toolbar-label">—</span>
      <span id="toolbar-counter"></span>
      <span id="toolbar-spacer"></span>
      <button class="tb-btn" id="btn-zoom" onclick="toggleZoom()" title="Toggle zoom (Z)">Fit</button>
      <button class="tb-btn" id="btn-prev" onclick="navigate(-1)" disabled title="Previous (←)">‹</button>
      <button class="tb-btn" id="btn-next" onclick="navigate(1)" disabled title="Next (→)">›</button>
    </div>

    <!-- Image area -->
    <div id="image-area" onclick="toggleZoom()">
      <div id="img-placeholder">
        <div class="placeholder-icon">🗂️</div>
        <div>Select a date to view images</div>
      </div>
      <img id="current-img" style="display:none" alt="Intake sheet"/>
      <div id="img-spinner"></div>
      <div id="img-error">
        <div style="font-size:32px">⚠️</div>
        <div>Could not load image</div>
      </div>
    </div>

    <!-- Thumbnail strip -->
    <div id="thumb-strip"></div>

  </div>
</div>

<!-- Global error -->
<div id="global-error">
  <div style="font-size:32px;margin-bottom:8px">⚠️</div>
  <div id="global-error-msg">Failed to load intake images.</div>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
const authToken = sessionStorage.getItem('chirotrax_token');
if (!authToken) { window.location.href = '/'; }

async function apiGet(path) {
  const res = await fetch(path, {
    headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' }
  });
  if (res.status === 401) { window.location.href = '/'; throw new Error('auth'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── State ─────────────────────────────────────────────────────────────────────
let index = [];        // [{id, business_date, file_name, created_at}, ...]
let dateMap = {};      // date → [record, ...]
let selectedDate = null;
let dateImages = [];   // records for selected date
let currentIdx = 0;
let isZoomed = false;
let imageCache = {};   // id → base64 data URI

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    index = await apiGet('/api/intake-images');
  } catch (e) {
    if (e.message === 'auth') return;
    document.getElementById('app').style.display = 'none';
    const ge = document.getElementById('global-error');
    document.getElementById('global-error-msg').textContent = 'Failed to load image index: ' + e.message;
    ge.style.display = 'block';
    return;
  }

  // Group by date
  dateMap = {};
  index.forEach(r => {
    if (!dateMap[r.business_date]) dateMap[r.business_date] = [];
    dateMap[r.business_date].push(r);
  });

  renderDateList();

  const dates = Object.keys(dateMap).sort().reverse();
  if (dates.length) selectDate(dates[0]);
}

// ── Date list ─────────────────────────────────────────────────────────────────
function renderDateList() {
  const list = document.getElementById('date-list');
  const dates = Object.keys(dateMap).sort().reverse();

  if (!dates.length) {
    list.innerHTML = '<div style="padding:20px 16px;font-size:12px;color:var(--ink3)">No images found.</div>';
    return;
  }

  list.innerHTML = dates.map(d => {
    const count = dateMap[d].length;
    const label = formatDate(d);
    return `<div class="date-row" data-date="${d}" onclick="selectDate('${d}')">
      <span>${label}</span>
      <span class="date-badge">${count}</span>
    </div>`;
  }).join('');
}

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  return `${m}/${d}/${y.slice(2)}`;
}

// ── Select date ───────────────────────────────────────────────────────────────
function selectDate(date) {
  if (selectedDate === date) return;
  selectedDate = date;
  currentIdx = 0;

  // Highlight row
  document.querySelectorAll('.date-row').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });

  dateImages = (dateMap[date] || []).sort((a, b) => a.created_at.localeCompare(b.created_at));

  renderThumbStrip();
  loadImage(0);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(delta) {
  const next = currentIdx + delta;
  if (next < 0 || next >= dateImages.length) return;
  currentIdx = next;
  loadImage(currentIdx);
  syncThumbStrip();
}

// ── Load image ────────────────────────────────────────────────────────────────
async function loadImage(idx) {
  if (!dateImages.length) return;
  const rec = dateImages[idx];
  if (!rec) return;

  currentIdx = idx;
  updateToolbar();
  syncThumbStrip();

  const img = document.getElementById('current-img');
  const spinner = document.getElementById('img-spinner');
  const errEl = document.getElementById('img-error');
  const placeholder = document.getElementById('img-placeholder');

  // Cache hit
  if (imageCache[rec.id]) {
    placeholder.style.display = 'none';
    errEl.style.display = 'none';
    img.src = imageCache[rec.id];
    img.style.display = 'block';
    spinner.style.display = 'none';
    syncThumbStrip();
    return;
  }

  // Fetch
  placeholder.style.display = 'none';
  errEl.style.display = 'none';
  img.style.display = 'none';
  spinner.style.display = 'block';

  try {
    const data = await apiGet(`/api/intake-images/${rec.id}`);
    const src = data.image_data;
    imageCache[rec.id] = src;
    img.src = src;
    img.style.display = 'block';
    spinner.style.display = 'none';
    syncThumbStrip();
  } catch (e) {
    if (e.message === 'auth') return;
    spinner.style.display = 'none';
    errEl.style.display = 'flex';
  }
}

// ── Toolbar ───────────────────────────────────────────────────────────────────
function updateToolbar() {
  const lbl = document.getElementById('toolbar-label');
  const ctr = document.getElementById('toolbar-counter');
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');

  if (selectedDate) {
    lbl.textContent = formatDate(selectedDate);
    if (dateImages.length > 1) {
      ctr.textContent = `${currentIdx + 1} / ${dateImages.length}`;
    } else {
      ctr.textContent = dateImages.length === 1 ? '1 / 1' : '';
    }
  } else {
    lbl.textContent = '—';
    ctr.textContent = '';
  }

  prev.disabled = currentIdx <= 0;
  next.disabled = currentIdx >= dateImages.length - 1;
}

// ── Zoom ─────────────────────────────────────────────────────────────────────
function toggleZoom() {
  const img = document.getElementById('current-img');
  if (img.style.display === 'none') return; // no image loaded

  isZoomed = !isZoomed;
  const area = document.getElementById('image-area');
  const btn = document.getElementById('btn-zoom');

  area.classList.toggle('zoom-mode', isZoomed);
  btn.textContent = isZoomed ? 'Fit' : 'Zoom';
  btn.classList.toggle('active', isZoomed);
}

function exitZoom() {
  if (!isZoomed) return;
  isZoomed = true; // so toggleZoom flips it to false
  toggleZoom();
}

// ── Thumbnail strip ──────────────────────────────────────────────────────────
function renderThumbStrip() {
  const strip = document.getElementById('thumb-strip');
  if (dateImages.length < 2) {
    strip.style.display = 'none';
    return;
  }
  strip.style.display = 'flex';
  strip.innerHTML = dateImages.map((rec, i) => {
    const cached = imageCache[rec.id];
    const active = i === currentIdx ? ' active' : '';
    if (cached) {
      return `<div class="thumb-tile${active}" onclick="loadImage(${i})"><img src="${cached}" alt="${i + 1}"/></div>`;
    }
    return `<div class="thumb-tile${active}" onclick="loadImage(${i})">${i + 1}</div>`;
  }).join('');
}

function syncThumbStrip() {
  const strip = document.getElementById('thumb-strip');
  if (dateImages.length < 2) return;

  const tiles = strip.querySelectorAll('.thumb-tile');
  tiles.forEach((tile, i) => {
    tile.classList.toggle('active', i === currentIdx);
    // Replace placeholder tile with image if now cached
    if (!tile.querySelector('img') && imageCache[dateImages[i]?.id]) {
      tile.innerHTML = `<img src="${imageCache[dateImages[i].id]}" alt="${i + 1}"/>`;
    }
  });

  // Scroll active tile into view
  const activeTile = tiles[currentIdx];
  if (activeTile) activeTile.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  else if (e.key === 'Escape') exitZoom();
  else if (e.key === 'z' || e.key === 'Z') toggleZoom();
});

// ── Start ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
